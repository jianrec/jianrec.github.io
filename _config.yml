title: 周健的技术博客
description: LLM、LLM4Rec、Agent 与论文阅读笔记
url: "https://jianrec.github.io"
baseurl: ""
lang: "zh-CN"
timezone: "Asia/Shanghai"

author:
  name: 周健
  email: ""

entry_link:
  text: "← 学术主页"
  url: "#"

waline_server: ""
reaction_api: ""

markdown: kramdown
permalink: /posts/:year-:month-:day-:title/

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "周健"
      main_category: "技术随笔"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "post"
      author: "周健"

study_order:
  - ai-agent-learning
